name: PR Build Check (Dry Run)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-check:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish project (Dry Run)
      run: |
        dotnet publish Kil0bitSystemMonitor.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o dryrun-publish

    - name: Verify Installer Build (Dry Run)
      run: |
        dotnet tool install --global wix --version 5.0.2 || dotnet tool update --global wix --version 5.0.2
        wix extension add WixToolset.UI.wixext/5.0.2 --global
        # Verify wix scripts using the publish output
        wix build wix/main.wxs -ext WixToolset.UI.wixext -d "Version=0.0.0" -d "publish=dryrun-publish" -d "EXE_NAME=Kil0bitSystemMonitor.exe" -o "dryrun.msi"
        # Cleanup
        if (Test-Path "dryrun.msi") { Remove-Item "dryrun.msi" }
        if (Test-Path "dryrun-publish") { Remove-Item -Recurse -Force "dryrun-publish" }
